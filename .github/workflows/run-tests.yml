name: run-tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            php: 8.2
            laravel: 10.*
            testbench: 8.*
            carbon: ^2.63
            saloon: 3.15.0
            stability: prefer-stable
            allow_insecure_saloon: true
          - os: ubuntu-latest
            php: 8.2
            laravel: 10.*
            testbench: 8.*
            carbon: ^2.63
            saloon: ^4.0
            stability: prefer-stable
            allow_insecure_saloon: false
          - os: ubuntu-latest
            php: 8.3
            laravel: 11.*
            testbench: 9.*
            carbon: ^3.0
            saloon: ^4.0
            stability: prefer-stable
            allow_insecure_saloon: false

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - Saloon ${{ matrix.saloon }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          if [ "${{ matrix.allow_insecure_saloon }}" = "true" ]; then
            composer config audit.block-insecure false
          fi
          composer require --dev "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "nesbot/carbon:${{ matrix.carbon }}" --no-interaction --no-update
          composer require "saloonphp/saloon:${{ matrix.saloon }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci
